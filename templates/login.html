<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>
    <link rel="stylesheet" href="{{url_for('static',filename='style.css')}}">
</head>

<body>

    <div class="login-container">

        <div class="login-box">

            <h1>📚 Library Login</h1>

            <form action="" method="POST">

                <label>Username</label>
                <input type="text"
                       name="username"
                       class="input-field"
                       required>

                <label>Password</label>
                <input type="password"
                       name="password"
                       class="input-field"
                       required>

                <input type="submit"
                       value="Login"
                       class="btn">

                <p class="register-link">
                    Don't Have an Account?
                </p>

                <a href="{{url_for('register')}}"
                   class="link-btn">
                    Register
                </a>

            </form>

        </div>

    </div>

</body>
</html>
